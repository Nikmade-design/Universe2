<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Портфолио | Контакты</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <div class="container header-inner">
            <div>
                <h1 class="logo">Пантелеев Никита</h1>
                <p class="subtitle">Студент · Веб-технологии</p>
            </div>

            <nav class="nav">
                <a href="index.html">Главная</a>
                <a href="about.html">О себе</a>
                <a href="projects.html">Проекты</a>
                <a href="contact.html" class="active">Контакты</a>
            </nav>

            <button class="theme-toggle" id="themeToggle">Сменить тему</button>
        </div>
    </header>

    <main class="container">
        <section class="card">
            <h2>Контакты</h2>

            <form class="contact-form">
                <label for="name">Имя</label>
                <input type="text" id="name" name="name" placeholder="Введите ваше имя" required>

                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="Введите ваш email" required>

                <label for="message">Сообщение</label>
                <textarea id="message" name="message" rows="6" placeholder="Введите сообщение" required></textarea>

                <button type="submit" class="btn">Отправить</button>
            </form>
        </section>

        <section class="card">
            <h2>Контактная информация</h2>
            <ul class="info-list">
                <li><strong>Email:</strong> nikita@example.com</li>
                <li><strong>Telegram:</strong> <a href="#">@n1kita.pont</a></li>
                <li><strong>Instagram:</strong> <a href="https://www.instagram.com/nikmade.design" target="_blank">nikmade.design</a></li>
                <li><strong>GitHub:</strong> <a href="https://github.com/Nikmade-design/Universe2" target="_blank">Nikmade-design</a></li>
                <li><strong>LinkedIn:</strong> <a href="#">Добавить ссылку</a></li>
            </ul>
        </section>
    </main>

    <footer class="footer">
        <div class="container">
            <p>© <span id="year"></span> nikmade-design</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
